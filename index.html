<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite Especial</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #000, #222);
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      max-width: 400px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    #yesBtn {
      background: #28a745;
      color: white;
    }

    #noBtn {
      background: #dc3545;
      color: white;
      position: absolute;
    }

    #extra {
      margin-top: 20px;
      display: none;
    }

    a {
      color: #1db954;
      text-decoration: none;
      display: block;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Convite para a mais mais </h2>
    <p>Vamos tentar alinhar nossas agendas e ir ver o novo filme do Michael Jackson no cinema? 🍿</p>

    <button id="yesBtn">Sim</button>
    <button id="noBtn">Não</button>

    <div id="extra">
      <p>Parabéns pela escolha sem pressão, tudo na base da conversa</p>
      <a href="https://youtu.be/oFmP8GE9LVs?si=vEKNRZomnv7lJ1e6" target="_blank">Abrir vídeo no YouTube (confia)</a>
      <a href="https://open.spotify.com/intl-pt/track/4oY2T9ur7Ll5b2kpBlcWcb?si=84d979d310c24b1a" target="_blank">Ouvir música do MJ que me lembra ocê</a>
    </div>
  </div>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const extra = document.getElementById('extra');

    yesBtn.addEventListener('click', () => {
      window.open('https://youtu.be/oFmP8GE9LVs?si=vEKNRZomnv7lJ1e6', '_blank');
      extra.style.display = 'block';
    });

    noBtn.addEventListener('mouseover', () => {
      const x = Math.random() * (window.innerWidth - noBtn.clientWidth);
      const y = Math.random() * (window.innerHeight - noBtn.clientHeight);

      noBtn.style.left = x + 'px';
      noBtn.style.top = y + 'px';
    });
  </script>
</body>
</html>
